{{- if .Values.navidrome.ingress.enabled }}
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: navidrome
  labels:
    app.service: navidrome
  {{- with .Values.navidrome.ingress.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
spec:
  ingressClassName: {{ .Values.navidrome.ingress.ingressClassName }}
  {{- if .Values.navidrome.ingress.tls }}
  tls:
    {{- range .Values.navidrome.ingress.tls }}
    - hosts:
        {{- range .hosts }}
        - {{ . | quote }}
        {{- end }}
      secretName: {{ .secretName }}
    {{- end }}
  {{- end }}
  rules:
    {{- range .Values.navidrome.ingress.hosts }}
    - host: {{ .host | quote }}
      http:
        paths:
          {{- range .paths }}
          - path: {{ .path }}
            pathType: Prefix
            backend:
              service:
                name: navidrome
                port:
                  number: {{ $.Values.navidrome.service.port }}
          {{- end }}
    {{- end }}
{{- end }}
