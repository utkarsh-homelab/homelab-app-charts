apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cwa-config
spec:
  accessModes:
    - {{ .Values.calibre_web_automated.persistence.config.accessMode }}
  storageClassName: {{ .Values.calibre_web_automated.persistence.config.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.calibre_web_automated.persistence.config.size }}
---
{{- if and .Values.calibre_web_automated.persistence.library.enabled (not .Values.calibre_web_automated.persistence.library.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: calibre-library-pvc
spec:
  accessModes:
    - {{ .Values.calibre_web_automated.persistence.library.accessMode }}
  storageClassName: {{ .Values.calibre_web_automated.persistence.library.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.calibre_web_automated.persistence.library.size }}
{{- end }}
---
{{- if and .Values.calibre_web_automated.persistence.ingest.enabled (not .Values.calibre_web_automated.persistence.ingest.existingClaim) }}
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: cwa-ingest
spec:
  accessModes:
    - {{ .Values.calibre_web_automated.persistence.ingest.accessMode }}
  storageClassName: {{ .Values.calibre_web_automated.persistence.ingest.storageClassName }}
  resources:
    requests:
      storage: {{ .Values.calibre_web_automated.persistence.ingest.size }}
{{- end }}
